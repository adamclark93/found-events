<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Preview</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #e6e1d7; }
    .shell { max-width: 1300px; margin: 0 auto; padding: 24px; }
    .header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
    .header h1 { font-size: 18px; margin: 0; color: #2d2d2d; }
    .header p { font-size: 13px; color: #666; margin: 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button {
      background: #fff; border: 1px solid #d9d3c8; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600; color: #2d2d2d; cursor: pointer;
    }
    .tabs button.active { background: #2d2d2d; color: #fff; border-color: #2d2d2d; }
    .frame-wrap { background: #f1ece4; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    iframe { width: 100%; height: 1600px; border: none; display: block; background: #f1ece4; }
    .meta { font-size: 12px; color: #888; margin-top: 12px; font-family: ui-monospace, monospace; word-break: break-all; }
    .meta strong { color: #2d2d2d; font-family: -apple-system, sans-serif; font-weight: 600; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h1>Email preview</h1>
      <p>Live-rendered from <code>api/_lib/email.js</code>. Reload after you save edits.</p>
    </div>
    <div class="tabs">
      <button data-kind="confirmation" class="active">Confirmation</button>
      <button data-kind="reminder">Reminder (day before)</button>
    </div>
    <div class="frame-wrap">
      <iframe id="preview"></iframe>
    </div>
    <p class="meta" id="subject"></p>
  </div>

  <script type="module">
    import { buildConfirmationEmail, buildReminderEmail, SESSION } from './api/_lib/email.js';

    const origin = window.location.origin;
    const args = { firstName: 'Adam', zoomJoinUrl: SESSION.joinUrl, origin };

    const emails = {
      confirmation: buildConfirmationEmail(args),
      reminder: buildReminderEmail(args)
    };

    const iframe = document.getElementById('preview');
    const subjectEl = document.getElementById('subject');

    function render(kind) {
      const { subject, html } = emails[kind];
      iframe.srcdoc = html;
      subjectEl.innerHTML = `<strong>Subject:</strong> ${subject}`;
      document.querySelectorAll('.tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.kind === kind);
      });
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => render(btn.dataset.kind));
    });

    render('confirmation');
  </script>
</body>
</html>
